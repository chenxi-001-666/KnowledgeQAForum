<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Login - Knowledge QA Forum</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 350px; }
        .auth-card h2 { margin-top: 0; color: #333; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn-primary:hover { background: #0056b3; }
        .auth-footer { margin-top: 20px; text-align: center; font-size: 14px; color: #888; }
        .auth-footer a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>User login</h2>
        {% if form.errors %}
            <p style="color: red; text-align: center; font-size: 14px;">
                Username or password is incorrect. Please try again.
            </p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>
        <div class="auth-footer">
            <p><a href="{% url 'password_reset' %}">Forget Password?</a></p>
            <p>Without an account?<a href="{% url 'register' %}">Click here to register</a></p>
        </div>
    </div>
</body>
</html>
