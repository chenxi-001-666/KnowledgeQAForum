<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Register - Knowledge QA Forum</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 400px; }
        .auth-card h2 { margin-top: 0; color: #333; text-align: center; }
        .btn-primary { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        /* 这里的样式为了美化 Django 默认生成的表单 */
        form p { margin-bottom: 15px; color: #666; }
        form input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .auth-footer { margin-top: 20px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Join the forum</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Confirm</button>
        </form>
        <div class="auth-footer">
            Already have an account?<a href="{% url 'login' %}">Click here to login.</a>
        </div>
    </div>
</body>
</html>
